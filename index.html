  <script>
    /**
     * @fileoverview Professional Color Palette Generator
     * @author ramsny1-ops
     * @version 2.0.0
     * @description Advanced color harmony engine with lockable colors, history, and export capabilities.
     */

    /**
     * @typedef {Object} RGB
     * @property {number} r - Red channel 0-255
     * @property {number} g - Green channel 0-255
     * @property {number} b - Blue channel 0-255
     */

    /**
     * @typedef {Object} HSL
     * @property {number} h - Hue 0-360
     * @property {number} s - Saturation 0-100
     * @property {number} l - Lightness 0-100
     */

    /**
     * @type {string[]} ___currentPalette - Array of 6 hex colors currently displayed
     */
    let ___currentPalette = [];

    /**
     * @type {string[]} ___paletteHistory - History of base colors used
     */
    let ___paletteHistory = [];

    /**
     * @type {boolean[]} ___lockedStates - Lock state for each of 6 palette positions
     */
    let ___lockedStates = [false, false, false, false, false, false];

    /**
     * @type {number} ___MAX_HISTORY - Maximum number of history items to store
     */
    const ___MAX_HISTORY = 12;

    /**
     * Displays a temporary toast notification
     * @param {string} ___message - Text to display in toast
     * @returns {void}
     */
    const ___showToast = (___message) => {
      const ___existing = document.querySelector('.toast-global');
      if (___existing) ___existing.remove();
      const ___toast = document.createElement('div');
      ___toast.className = 'toast-global';
      ___toast.innerText = ___message;
      document.body.appendChild(___toast);
      setTimeout(() => ___toast.remove(), 2000);
    };

    /**
     * Converts hex color to RGB object
     * @param {string} ___hex - Hex color string (e.g., "#3b82f6")
     * @returns {RGB} RGB object
     */
    const ___hexToRgb = (___hex) => {
      const ___clean = ___hex.replace('#', '');
      return {
        r: parseInt(___clean.slice(0, 2), 16),
        g: parseInt(___clean.slice(2, 4), 16),
        b: parseInt(___clean.slice(4, 6), 16)
      };
    };

    /**
     * Converts RGB components to hex string
     * @param {number} ___r - Red 0-255
     * @param {number} ___g - Green 0-255
     * @param {number} ___b - Blue 0-255
     * @returns {string} Hex color string
     */
    const ___rgbToHex = (___r, ___g, ___b) => {
      return '#' + ((1 << 24) + (___r << 16) + (___g << 8) + ___b).toString(16).slice(1);
    };

    /**
     * Converts RGB to HSL
     * @param {number} ___r - Red 0-255
     * @param {number} ___g - Green 0-255
     * @param {number} ___b - Blue 0-255
     * @returns {HSL} HSL object
     */
    const ___rgbToHsl = (___r, ___g, ___b) => {
      let ___rr = ___r / 255, ___gg = ___g / 255, ___bb = ___b / 255;
      const ___max = Math.max(___rr, ___gg, ___bb), ___min = Math.min(___rr, ___gg, ___bb);
      let ___h, ___s, ___l = (___max + ___min) / 2;
      if (___max === ___min) {
        ___h = ___s = 0;
      } else {
        const ___d = ___max - ___min;
        ___s = ___l > 0.5 ? ___d / (2 - ___max - ___min) : ___d / (___max + ___min);
        switch (___max) {
          case ___rr: ___h = (___gg - ___bb) / ___d + (___gg < ___bb ? 6 : 0); break;
          case ___gg: ___h = (___bb - ___rr) / ___d + 2; break;
          case ___bb: ___h = (___rr - ___gg) / ___d + 4; break;
        }
        ___h /= 6;
      }
      return {
        h: Math.round(___h * 360),
        s: Math.round(___s * 100),
        l: Math.round(___l * 100)
      };
    };

    /**
     * Converts HSL to RGB
     * @param {number} ___h - Hue 0-360
     * @param {number} ___s - Saturation 0-100
     * @param {number} ___l - Lightness 0-100
     * @returns {RGB} RGB object
     */
    const ___hslToRgb = (___h, ___s, ___l) => {
      ___h = ___h / 360;
      ___s = ___s / 100;
      ___l = ___l / 100;
      let ___r, ___g, ___b;
      if (___s === 0) {
        ___r = ___g = ___b = ___l;
      } else {
        const ___hue2rgb = (___p, ___q, ___t) => {
          if (___t < 0) ___t += 1;
          if (___t > 1) ___t -= 1;
          if (___t < 1 / 6) return ___p + (___q - ___p) * 6 * ___t;
          if (___t < 1 / 2) return ___q;
          if (___t < 2 / 3) return ___p + (___q - ___p) * (2 / 3 - ___t) * 6;
          return ___p;
        };
        const ___q = ___l < 0.5 ? ___l * (1 + ___s) : ___l + ___s - ___l * ___s;
        const ___p = 2 * ___l - ___q;
        ___r = ___hue2rgb(___p, ___q, ___h + 1 / 3);
        ___g = ___hue2rgb(___p, ___q, ___h);
        ___b = ___hue2rgb(___p, ___q, ___h - 1 / 3);
      }
      return {
        r: Math.round(___r * 255),
        g: Math.round(___g * 255),
        b: Math.round(___b * 255)
      };
    };

     * Calculates relative luminance of a hex color (WCAG)
     * @param {string} ___hex - Hex color
     * @returns {number} Luminance value 0-1
     */
    const ___luminance = (___hex) => {
      const { r, g, b } = ___hexToRgb(___hex);
      const ___linear = (___c) => {
        let ___v = ___c / 255;
        return ___v <= 0.03928 ? ___v / 12.92 : Math.pow((___v + 0.055) / 1.055, 2.4);
      };
      return 0.2126 * ___linear(r) + 0.7152 * ___linear(g) + 0.0722 * ___linear(b);
    };

    /**
     * Calculates contrast ratio between two colors
     * @param {string} ___hex1 - First color
     * @param {string} ___hex2 - Second color
     * @returns {string} Contrast ratio as string with 2 decimals
     */
    const ___contrastRatio = (___hex1, ___hex2) => {
      const ___l1 = ___luminance(___hex1);
      const ___l2 = ___luminance(___hex2);
      const ___light = Math.max(___l1, ___l2);
      const ___dark = Math.min(___l1, ___l2);
      return ((___light + 0.05) / (___dark + 0.05)).toFixed(2);
    };

    /**
     * Returns WCAG grade based on contrast ratio
     * @param {string} ___ratio - Contrast ratio
     * @returns {string} 'AAA', 'AA', or 'Fail'
     */
    const ___wcagGrade = (___ratio) => {
      const ___r = parseFloat(___ratio);
      if (___r >= 7) return 'AAA';
      if (___r >= 4.5) return 'AA';
      return 'Fail';
    };

    /**
     * Generates a friendly color name based on hue and lightness
     * @param {string} ___hex - Hex color
     * @returns {string} Color name
     */
    const ___colorName = (___hex) => {
      const { h, l } = ___rgbToHsl(...Object.values(___hexToRgb(___hex)));
      const ___map = [
        [0, 20, 'Red'], [21, 45, 'Orange'], [46, 75, 'Amber'], [76, 165, 'Green'],
        [166, 210, 'Cyan'], [211, 260, 'Azure'], [261, 310, 'Violet'], [311, 360, 'Magenta']
      ];
      let ___hueName = 'Neutral';
      for (const [___low, ___high, ___name] of ___map) {
        if (h >= ___low && h <= ___high) { ___hueName = ___name; break; }
      }
      if (l < 18) return `Deep ${___hueName}`;
      if (l > 82) return `Pale ${___hueName}`;
      return ___hueName;
    };

    /**
     * Generates 6 colors based on base hex and harmony mode
     * @param {string} ___baseHex - Base color
     * @param {string} ___mode - Harmony mode identifier
     * @returns {string[]} Array of 6 hex colors
     */
    const ___generateSixColors = (___baseHex, ___mode) => {
      const { h, s, l } = ___rgbToHsl(...Object.values(___hexToRgb(___baseHex)));
      let ___colors = [];
      if (___mode === 'complementary') {
        const ___comp = (h + 180) % 360;
        for (let ___i = 0; ___i < 6; ___i++) {
          let ___hue = (h + ___i * 36) % 360;
          if (___i === 1) ___hue = ___comp;
          ___colors.push(___rgbToHex(...Object.values(___hslToRgb(___hue, s, l))));
        }
      } else if (___mode === 'analogous') {
        const ___start = (h - 45 + 360) % 360;
        for (let ___i = 0; ___i < 6; ___i++) {
          const ___hue = (___start + ___i * 18) % 360;
          ___colors.push(___rgbToHex(...Object.values(___hslToRgb(___hue, s, l))));
        }
      } else if (___mode === 'triadic') {
        const ___angles = [0, 120, 240];
        for (let ___i = 0; ___i < 6; ___i++) {
          let ___hue = (h + ___angles[___i % 3]) % 360;
          let ___lightness = l + (Math.floor(___i / 3) === 0 ? 0 : (___i === 3 ? -12 : 12));
          ___lightness = Math.min(88, Math.max(18, ___lightness));
          ___colors.push(___rgbToHex(...Object.values(___hslToRgb(___hue, s, ___lightness))));
        }
      } else if (___mode === 'tetradic') {
        const ___offsets = [0, 90, 180, 270];
        for (let ___i = 0; ___i < 6; ___i++) {
          let ___hue = (h + ___offsets[___i % 4]) % 360;
          let ___lit = l + (___i > 3 ? 10 : -5);
          ___lit = Math.min(85, Math.max(20, ___lit));
          ___colors.push(___rgbToHex(...Object.values(___hslToRgb(___hue, s, ___lit))));
        }
      } else if (___mode === 'monochromatic') {
        for (let ___i = 0; ___i < 6; ___i++) {
          let ___newL = Math.min(88, Math.max(14, l + (___i - 2.5) * 12));
          ___colors.push(___rgbToHex(...Object.values(___hslToRgb(h, s, ___newL))));
        }
      } else if (___mode === 'split-complementary') {
        const ___comp = (h + 180) % 360;
        const ___left = (___comp - 30 + 360) % 360;
        const ___right = (___comp + 30) % 360;
        const ___baseHues = [h, ___left, ___right];
        for (let ___i = 0; ___i < 6; ___i++) {
          let ___hue = ___baseHues[___i % 3];
          let ___lightness = l + (___i > 2 ? 14 : -4);
          ___lightness = Math.min(85, Math.max(18, ___lightness));
          ___colors.push(___rgbToHex(...Object.values(___hslToRgb(___hue, s, ___lightness))));
        }
      } else {
        for (let ___i = 0; ___i < 6; ___i++) ___colors.push(___baseHex);
      }
      return ___colors.slice(0, 6);
    };

    /**
     * Applies locked colors to a freshly generated palette
     * @returns {string[]} Final palette respecting locks
     */
    const ___getFullPaletteWithLocks = () => {
      const ___base = document.getElementById('baseColor').value;
      const ___mode = document.getElementById('harmonySelect').value;
      const ___fresh = ___generateSixColors(___base, ___mode);
      const ___final = [...___fresh];
      for (let ___i = 0; ___i < 6; ___i++) {
        if (___lockedStates[___i] && ___currentPalette[___i]) ___final[___i] = ___currentPalette[___i];
      }
      return ___final;
    };

    /**
     * Creates a DOM element for a color card with lock and contrast badge
     * @param {string} ___hex - Hex color
     * @param {number} ___index - Position in palette (0-5)
     * @returns {HTMLElement} Color card div
     */
    const ___createColorCard = (___hex, ___index) => {
      const ___isLight = ___luminance(___hex) > 0.5;
      const ___textColor = ___isLight ? '#111' : '#fff';
      const ___ratioWhite = ___contrastRatio(___hex, '#ffffff');
      const ___ratioBlack = ___contrastRatio(___hex, '#000000');
      const ___bestRatio = parseFloat(___ratioWhite) > parseFloat(___ratioBlack) ? ___ratioWhite : ___ratioBlack;
      const ___grade = ___wcagGrade(___bestRatio);
      let ___gradeClass = 'contrast-fail';
      if (___grade === 'AAA') ___gradeClass = 'contrast-aaa';
      else if (___grade === 'AA') ___gradeClass = 'contrast-aa';
      
      const ___card = document.createElement('div');
      ___card.className = 'b2n3m4v5-c6x7-z8a9-s1d2-f3g4h5j6k7l8';
      ___card.style.backgroundColor = ___hex;
      ___card.style.color = ___textColor;
      ___card.innerHTML = `
        <div class="k9j8h7g6-f5d4-s3a2-z1x2-c3v4b5n6m7k8" data-idx="${___index}">${___lockedStates[___index] ? '🔒' : '🔓'}</div>
        <div class="j4h5g6f7-d8s9-a0z1-x2c3-v4b5n6m7k8l9">${___hex.toUpperCase()}</div>
        <div class="m9n8b7v6-c5x4-z3a2-s1d2-f3g4h5j6k7l8">${___colorName(___hex)}</div>
        <div class="q2w3e4r5-t6y7-u8i9-o0p1-a2s3d4f5g6h7 ${___gradeClass}">WCAG ${___grade} ${___bestRatio}:1</div>
      `;
      const ___lockDiv = ___card.querySelector('.k9j8h7g6-f5d4-s3a2-z1x2-c3v4b5n6m7k8');
      ___lockDiv.addEventListener('click', (___e) => {
        ___e.stopPropagation();
        ___lockedStates[___index] = !___lockedStates[___index];
        ___generateFullPalette();
      });
      ___card.addEventListener('click', (___e) => {
        if (___e.target === ___lockDiv || ___lockDiv.contains(___e.target)) return;
        navigator.clipboard.writeText(___hex);
        ___showToast(`Copied ${___hex}`);
      });
      return ___card;
    };

    /**
     * Renders the main palette grid
     * @param {string[]} ___colors - Array of 6 hex colors
     * @returns {void}
     */
    const ___renderPalette = (___colors) => {
      const ___grid = document.getElementById('paletteGrid');
      ___grid.innerHTML = '';
      ___colors.forEach((___c, ___idx) => ___grid.appendChild(___createColorCard(___c, ___idx)));
      ___currentPalette = [...___colors];
      ___updateGradientPreview(___colors);
      ___updatePairsFromPalette();
      ___addToHistory(___colors[0]);
    };

    /**
     * Updates the gradient preview bar
     * @param {string[]} ___colors - Array of hex colors
     * @returns {void}
     */
    const ___updateGradientPreview = (___colors) => {
      const ___gradDiv = document.getElementById('gradientPreview');
      const ___gradientStr = `linear-gradient(90deg, ${___colors.join(', ')})`;
      ___gradDiv.style.background = ___gradientStr;
      ___gradDiv.onclick = () => {
        navigator.clipboard.writeText(___colors.join(', '));
        ___showToast('Gradient CSS copied');
      };
    };

    /**
     * Adds a color to history (deduplicated)
     * @param {string} ___color - Hex color to add
     * @returns {void}
     */
    const ___addToHistory = (___color) => {
      if (!___paletteHistory.includes(___color)) {
        ___paletteHistory.unshift(___color);
        if (___paletteHistory.length > ___MAX_HISTORY) ___paletteHistory.pop();
        ___renderHistory();
      }
    };

    /**
     * Renders the history strip
     * @returns {void}
     */
    const ___renderHistory = () => {
      const ___histDiv = document.getElementById('historyContainer');
      ___histDiv.innerHTML = '';
      ___paletteHistory.forEach(___hex => {
        const ___chip = document.createElement('div');
        ___chip.className = 'k9j8h7g6-f5d4-s3a2-z1x2-c3v4b5n6m7k8';
        ___chip.style.backgroundColor = ___hex;
        ___chip.addEventListener('click', () => {
          document.getElementById('baseColor').value = ___hex;
          ___generateFullPalette();
        });
        ___histDiv.appendChild(___chip);
      });
    };

    /**
     * Clears entire palette history
     * @returns {void}
     */
    const ___clearHistory = () => {
      ___paletteHistory = [];
      ___renderHistory();
      ___showToast('History cleared');
    };

    /**
     * Generates intelligent color pairs from current palette
     * @returns {void}
     */
    const ___updatePairsFromPalette = () => {
      if (!___currentPalette.length) return;
      const ___pairs = [];
      for (let ___i = 0; ___i < 6; ___i++) {
        let ___a = ___currentPalette[___i % ___currentPalette.length];
        let ___b = ___currentPalette[(___i + 3) % ___currentPalette.length];
        let ___ratio = parseFloat(___contrastRatio(___a, ___b));
        if (___ratio < 3.2) {
          const { h, s, l } = ___rgbToHsl(...Object.values(___hexToRgb(___a)));
          const ___newHue = (h + 140) % 360;
          ___b = ___rgbToHex(...Object.values(___hslToRgb(___newHue, Math.min(80, s + 12), 52)));
        }
        ___pairs.push({ c1: ___a, c2: ___b });
      }
      ___renderPairs(___pairs);
    };

    /**
     * Renders the color pairs grid
     * @param {Array<{c1:string, c2:string}>} ___pairs - Array of pair objects
     * @returns {void}
     */
    const ___renderPairs = (___pairs) => {
      const ___container = document.getElementById('pairsGrid');
      ___container.innerHTML = '';
      ___pairs.forEach(___pair => {
        const ___div = document.createElement('div');
        ___div.className = 'l2k3j4h5-g6f7-d8s9-a0z1-x2c3v4b5n6m7';
        const ___txt1 = ___luminance(___pair.c1) > 0.5 ? '#111' : '#fff';
        const ___txt2 = ___luminance(___pair.c2) > 0.5 ? '#111' : '#fff';
        ___div.innerHTML = `
          <div class="c8v7b6n5-m4k3-j2h1-g2f3-d4s5a6w7q8e9" style="background:${___pair.c1}; color:${___txt1}">${___pair.c1.toUpperCase()}</div>
          <div class="c8v7b6n5-m4k3-j2h1-g2f3-d4s5a6w7q8e9" style="background:${___pair.c2}; color:${___txt2}">${___pair.c2.toUpperCase()}</div>
        `;
        ___div.addEventListener('click', () => {
          navigator.clipboard.writeText(`${___pair.c1} · ${___pair.c2}`);
          ___showToast(`Pair copied`);
        });
        ___container.appendChild(___div);
      });
    };

    /**
     * Main palette generation entry point
     * @returns {void}
     */
    const ___generateFullPalette = () => {
      const ___newColors = ___getFullPaletteWithLocks();
      ___renderPalette(___newColors);
    };

    /**
     * Generates a completely random palette
     * @returns {void}
     */
    const ___randomPalette = () => {
      const ___rand = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
      document.getElementById('baseColor').value = ___rand;
      ___generateFullPalette();
    };

    /**
     * Copies all 6 hex colors to clipboard as comma-separated string
     * @returns {void}
     */
    const ___copyAllHex = () => {
      const ___text = ___currentPalette.join(', ');
      navigator.clipboard.writeText(___text);
      ___showToast('All 6 colors copied');
    };

    /**
     * Exports palette as CSS custom properties
     * @returns {void}
     */
    const ___exportCSS = () => {
      let ___css = ':root {\n';
      ___currentPalette.forEach((___col, ___idx) => {
        ___css += `  --color-${___idx + 1}: ${___col};\n`;
      });
      ___css += '}\n';
      ___download(___css, 'palette_root.css', 'text/css');
      ___showToast('CSS variables exported');
    };

    /**
     * Exports palette as SCSS map
     * @returns {void}
     */
    const ___exportSCSS = () => {
      let ___scss = '$palette: (\n';
      ___currentPalette.forEach((___col, ___idx) => {
        ___scss += `  'c${___idx + 1}': ${___col},\n`;
      });
      ___scss += ');\n';
      ___download(___scss, '_palette.scss', 'text/scss');
      ___showToast('SCSS map exported');
    };

    /**
     * Exports palette as JSON with metadata
     * @returns {void}
     */
    const ___exportJSON = () => {
      const ___data = {
        palette: ___currentPalette,
        harmony: document.getElementById('harmonySelect').value,
        locked: ___lockedStates,
        generated: new Date().toISOString()
      };
      ___download(JSON.stringify(___data, null, 2), 'palette_system.json', 'application/json');
      ___showToast('JSON exported');
    };

    /**
     * Generic file download utility
     * @param {string} ___content - File content
     * @param {string} ___filename - Output filename
     * @param {string} ___mime - MIME type
     * @returns {void}
     */
    const ___download = (___content, ___filename, ___mime) => {
      const ___blob = new Blob([___content], { type: ___mime });
      const ___link = document.createElement('a');
      ___link.href = URL.createObjectURL(___blob);
      ___link.download = ___filename;
      ___link.click();
      URL.revokeObjectURL(___link.href);
    };

    /**
     * Attaches all event listeners to UI controls
     * @returns {void}
     */
    const ___bindEvents = () => {
      document.getElementById('generateBtn').addEventListener('click', ___generateFullPalette);
      document.getElementById('randomBtn').addEventListener('click', ___randomPalette);
      document.getElementById('exportCssBtn').addEventListener('click', ___exportCSS);
      document.getElementById('exportScssBtn').addEventListener('click', ___exportSCSS);
      document.getElementById('exportJsonBtn').addEventListener('click', ___exportJSON);
      document.getElementById('copyAllBtn').addEventListener('click', ___copyAllHex);
      document.getElementById('clearHistoryBtn').addEventListener('click', ___clearHistory);
    };

    /**
     * Initializes the application
     * @returns {void}
     */
    const ___init = () => {
      ___bindEvents();
      ___generateFullPalette();
    };

    ___init();
  </script>
